<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docker Multi-Container Application</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    text-align:center;
    margin-top:60px;
}

h1{
    color:#2f55d4;
}

button{
    padding:12px 20px;
    font-size:18px;
    cursor:pointer;
}

#result{
    margin:30px auto;
    width:500px;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px gray;
}
</style>

</head>

<body>

<h1>Docker Multi-Container Application</h1>

<button onclick="getData()">
Call Backend API
</button>

<div id="result">
Waiting for response...
</div>

<script>

async function getData() {

    try {

        const response = await fetch("http://localhost:3000/");

        const data = await response.json();

        document.getElementById("result").innerHTML = `
            <h3>Backend Response</h3>
            <p><b>Message:</b> ${data.message}</p>
            <p><b>Redis:</b> ${data.redis}</p>
        `;

    } catch(err){

        document.getElementById("result").innerHTML = `
            <h3 style="color:red">Error</h3>
            <p>${err}</p>
        `;

        console.error(err);

    }

}

</script>

</body>
</html>
